name: Wave Check

on:
  issues:
    types: [labeled]
  workflow_dispatch:

jobs:
  check-readiness:
    if: github.event.label.name == 'wave-candidate'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Run Linter
        run: node src/index.js --owner ${{ github.repository_owner }} --repo ${{ github.event.repository.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
